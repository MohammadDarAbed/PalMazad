trigger:
  branches:
    include:
      - main

variables:
- group: GITHUB_TOKEN_PALMAZAD

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self

  - script: |
      echo "✅ Configuring Git"
      git config --global user.name "Azure DevOps"
      git config --global user.email "devops@palmazad.com"

      echo "✅ Adding GitHub remote"
      git remote add github https://$(GITHUB_TOKEN)@github.com/MohammadDarAbed/PalMazad.git

      echo "✅ Checking remotes"
      git remote -v

      echo "✅ Pushing to GitHub (main branch)"
      git push github HEAD:main --force
    displayName: 'Mirror Azure DevOps Repo to GitHub'
